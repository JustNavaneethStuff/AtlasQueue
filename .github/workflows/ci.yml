name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: atlas
          POSTGRES_PASSWORD: atlas
          POSTGRES_DB: atlasqueue
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U atlas -d atlasqueue"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://atlas:atlas@localhost:5432/atlasqueue
      REDIS_URL: redis://localhost:6379/0
      API_KEY: test-api-key
      WORKER_API_KEY: test-api-key

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        run: ruff check src tests

      - name: Ruff format check
        run: ruff format --check src tests

      - name: Mypy
        run: mypy src/atlasqueue

      - name: Run migrations
        run: alembic upgrade head

      - name: Pytest
        run: pytest tests --cov=atlasqueue --cov-report=term-missing

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build --target api -t atlasqueue-api .

      - name: Build worker image
        run: docker build --target worker -t atlasqueue-worker .

      - name: Build scheduler image
        run: docker build --target scheduler -t atlasqueue-scheduler .
