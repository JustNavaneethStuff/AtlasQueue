services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: atlas
      POSTGRES_DB: atlasqueue
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas -d atlasqueue"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  migrate:
    build:
      context: .
      target: api
    environment:
      DATABASE_URL: postgresql+asyncpg://atlas:atlas@postgres:5432/atlasqueue
      REDIS_URL: redis://redis:6379/0
      API_KEY: ${API_KEY:-dev-api-key}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin-change-me}
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      target: api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://atlas:atlas@postgres:5432/atlasqueue
      REDIS_URL: redis://redis:6379/0
      API_KEY: ${API_KEY:-dev-api-key}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin-change-me}
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
      LOG_LEVEL: INFO
      LOG_JSON: "true"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  worker:
    build:
      context: .
      target: worker
    environment:
      DATABASE_URL: postgresql+asyncpg://atlas:atlas@postgres:5432/atlasqueue
      REDIS_URL: redis://redis:6379/0
      API_KEY: ${API_KEY:-dev-api-key}
      WORKER_TASKS_MODULE: atlasqueue.worker.example_tasks
      WORKER_CONCURRENCY: 4
      LOG_LEVEL: INFO
      LOG_JSON: "true"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped

  scheduler:
    build:
      context: .
      target: scheduler
    environment:
      DATABASE_URL: postgresql+asyncpg://atlas:atlas@postgres:5432/atlasqueue
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: INFO
      LOG_JSON: "true"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      api:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.54.0
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - api
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./deploy/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./deploy/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
