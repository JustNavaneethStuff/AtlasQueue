services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: atlas
      POSTGRES_DB: atlasqueue
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas -d atlasqueue"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      target: api
    environment:
      DATABASE_URL: postgresql+asyncpg://atlas:atlas@postgres:5432/atlasqueue
      REDIS_URL: redis://redis:6379/0
      API_KEY: dev-api-key
      WORKER_API_KEY: dev-api-key
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      target: api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://atlas:atlas@postgres:5432/atlasqueue
      REDIS_URL: redis://redis:6379/0
      API_KEY: dev-api-key
      WORKER_API_KEY: dev-api-key
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
      LOG_LEVEL: INFO
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      target: worker
    environment:
      DATABASE_URL: postgresql+asyncpg://atlas:atlas@postgres:5432/atlasqueue
      REDIS_URL: redis://redis:6379/0
      API_KEY: dev-api-key
      WORKER_API_KEY: dev-api-key
      WORKER_TASKS_MODULE: atlasqueue.worker.example_tasks
      WORKER_CONCURRENCY: 4
      LOG_LEVEL: INFO
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    deploy:
      replicas: 1

  scheduler:
    build:
      context: .
      target: scheduler
    environment:
      DATABASE_URL: postgresql+asyncpg://atlas:atlas@postgres:5432/atlasqueue
      REDIS_URL: redis://redis:6379/0
      API_KEY: dev-api-key
      WORKER_API_KEY: dev-api-key
      LOG_LEVEL: INFO
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      api:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.54.0
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - api

volumes:
  postgres_data:
